<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 110" fill="none" role="img" aria-label="StarRAG">
  <defs>
    <linearGradient id="srGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc274"/>
      <stop offset=".5" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#ff5400"/>
    </linearGradient>
    <radialGradient id="srGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff8a2a" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ff8a2a" stop-opacity="0"/>
    </radialGradient>
    <style>@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@800&amp;display=swap');</style>
  </defs>

  <!-- guiding-light glow behind the star -->
  <circle cx="48" cy="55" r="42" fill="url(#srGlow)"/>

  <!-- star mark (4-point sparkle + companion) -->
  <g transform="translate(13,26) scale(2.55)">
    <path d="M12 2.5l1.6 4.9a2 2 0 0 0 1.3 1.3L20.5 10l-4.9 1.6a2 2 0 0 0-1.3 1.3L12 18.5l-1.6-4.9a2 2 0 0 0-1.3-1.3L3.5 10l4.9-1.6a2 2 0 0 0 1.3-1.3L12 2.5z" fill="url(#srGrad)"/>
    <path d="M19 15l.6 1.8a1 1 0 0 0 .6.6L22 18l-1.8.6a1 1 0 0 0-.6.6L19 21l-.6-1.8a1 1 0 0 0-.6-.6L16 18l1.8-.6a1 1 0 0 0 .6-.6L19 15z" fill="url(#srGrad)"/>
  </g>

  <!-- wordmark -->
  <text x="104" y="71" font-family="Manrope, 'Segoe UI', sans-serif" font-weight="800" font-size="50" letter-spacing="-1.5">
    <tspan fill="#ffffff">Star</tspan><tspan fill="url(#srGrad)">RAG</tspan>
  </text>
</svg>
